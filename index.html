<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MY_POS</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/style.css">
  <style>
    body { padding-top: 70px; }
    #sidebar { width: 250px; height: 100vh; z-index: 1000; }
    .content { margin-left: 260px; }
    @media (max-width: 768px) {
      .content { margin-left: 0; }
      #sidebar { display: none; }
    }
  </style>
</head>
<body>

<header>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark position-fixed w-100 top-0" style="z-index: 1050;">
    <div class="container-fluid">
      <a class="navbar-brand fw-bold" href="#">POS-SYSTEM</a>
      <button class="btn btn-outline-light d-lg-none" type="button" data-bs-toggle="collapse" data-bs-target="#sidebar">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="d-flex">
        <button class="btn btn-danger btn-sm" id="logout_btn">Logout</button>
      </div>
    </div>
  </nav>
</header>

<main class="d-flex">
  <aside id="sidebar" class="bg-light border-end position-fixed">
    <div class="list-group list-group-flush">
      <a href="#" class="list-group-item list-group-item-action bg-primary text-white" id="nav_dashboard">Dashboard</a>
      <a href="#" class="list-group-item list-group-item-action" id="nav_customer">Customer Management</a>
      <a href="#" class="list-group-item list-group-item-action" id="nav_item">Item Management</a>
      <a href="#" class="list-group-item list-group-item-action" id="nav_order">Place Order</a>
      <!--<a href="#" class="list-group-item list-group-item-action" id="nav_order_history">Order History</a>-->
    </div>
  </aside>

  <div class="container-fluid content mt-4">

    <section id="customer_section" class="spa-section">
      <h2 class="border-bottom pb-2">Customer Management</h2>
      <div class="row mt-4">
        <div class="col-md-4">
          <form id="customerForm" class="card p-3 shadow-sm">
            <div class="mb-2">
              <label class="form-label">Customer ID</label>
              <input type="text" class="form-control" id="cust_id">
            </div>
            <div class="mb-2">
              <label class="form-label">Name</label>
              <input type="text" class="form-control" id="cust_name">
            </div>
            <div class="mb-2">
              <label class="form-label">Phone</label>
              <input type="text" class="form-control" id="cust_phone">
            </div>
            <div class="mb-2">
              <label class="form-label">Address</label>
              <textarea class="form-control" id="cust_address" rows="2"></textarea>
            </div>
            <div class="mt-3">
              <button type="button" class="btn btn-success btn-sm" id="btn_save_customer">Save</button>
              <button type="button" class="btn btn-primary btn-sm" id="btn_update_customer">Update</button>
              <button type="button" class="btn btn-danger btn-sm" id="btn_delete_customer">Delete</button>
            </div>
          </form>
        </div>
        <div class="col-md-8">
          <table class="table table-hover border">
            <thead class="table-dark">
            <tr>
              <th>ID</th>
              <th>Name</th>
              <th>Phone</th>
              <th>Address</th>
            </tr>
            </thead>
            <tbody id="customer_table_body"></tbody>
          </table>
        </div>
      </div>
    </section>

    <section id="item_section" class="spa-section" style="display:none;">
      <h2 class="border-bottom pb-2">Item Management</h2>
      <div class="row mt-4">
        <div class="col-md-4">
          <form id="itemForm" class="card p-3 shadow-sm">
            <div class="mb-2">
              <label class="form-label">Item Code</label>
              <input type="text" class="form-control" id="item_id_input">
            </div>
            <div class="mb-2">
              <label class="form-label">Item Name</label>
              <input type="text" class="form-control" id="item_name_input">
            </div>
            <div class="mb-2">
              <label class="form-label">Unit Price</label>
              <input type="number" class="form-control" id="item_price_input">
            </div>
            <div class="mb-2">
              <label class="form-label">Qty On Hand</label>
              <input type="number" class="form-control" id="item_qty_input">
            </div>
            <div class="mt-3">
              <button type="button" class="btn btn-success btn-sm" id="btn_save_item">Save Item</button>
              <button type="button" class="btn btn-primary btn-sm" id="btn_update_item">Update</button>
              <button type="button" class="btn btn-danger btn-sm" id="btn_delete_item">Delete</button>
            </div>
          </form>
        </div>
        <div class="col-md-8">
          <table class="table table-hover border">
            <thead class="table-dark">
            <tr>
              <th>Code</th>
              <th>Name</th>
              <th>Price</th>
              <th>Qty</th>
            </tr>
            </thead>
            <tbody id="item_table_body"></tbody>
          </table>
        </div>
      </div>
    </section>

    <section id="order_section" class="spa-section" style="display:none;">
      <h2 class="border-bottom pb-2">Place Order</h2>
      <div class="row mt-4">
        <div class="col-md-4 card p-3">
          <h5>Order Info</h5>
          <div class="row">
            <div class="col"><label>Order ID:</label><input type="text" class="form-control mb-2" id="order_id" readonly></div>
            <div class="col"><label>Date:</label><input type="date" class="form-control mb-2"></div>
          </div>
          <label>Select Customer:</label>
          <select class="form-select mb-2" id="order_cust_select"></select>
        </div>
        <div class="col-md-5 card p-3 mx-2">
          <h5>Item Selection</h5>
          <label>Select Item:</label>
          <select class="form-select mb-2" id="order_item_select"></select>
          <div class="row">
            <div class="col"><label>Price:</label><input type="text" class="form-control mb-2" readonly></div>
            <div class="col"><label>Qty:</label><input type="number" class="form-control mb-2"></div>
          </div>
          <button class="btn btn-warning w-100">Add to Cart</button>
        </div>
        <div class="col card p-3 bg-light">
          <h3 class="text-danger">Total: <span id="total_display">0.00</span></h3>
          <button class="btn btn-success btn-lg mt-3">Purchase</button>
        </div>
      </div>
    </section>

  </div>
</main>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script src="controller/SidebarController.js"></script>
<script type="module" src="controller/CustomerController.js"></script>
<script type="module" src="controller/ItemController.js"></script>
<script type="module" src="controller/OrderController.js"></script>

</body>
</html>
